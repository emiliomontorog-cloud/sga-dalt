function gP(id){return PRODUCTS.find(function(p){return p.id===id;});}
function gS(id){return SUPPLIERS.find(function(s){return s.id===id;});}
function gC(id){return CLIENTS.find(function(c){return c.id===id;});}
function gR(id){return ROUTES.find(function(r){return r.id===id;});}
function gCar(id){return CARRIERS.find(function(c){return c.id===id;});}
function gFam(id){return FAMILIES.find(function(f){return f.id===id;});}
function gSFam(id){return SUBFAMILIES.find(function(s){return s.id===id;});}
function gLot(id){return DB.lots.find(function(l){return l.id===id;});}
function gPal(id){return DB.pallets.find(function(p){return p.id===id;});}
function gL(x){if(typeof x==='number')return DB.locations.find(function(l){return l.id===x;});return DB.locations.find(function(l){return l.code===x;});}
function fmt(d){return d?d.split('-').reverse().join('/'):'—';}
function hoy(){return new Date().toISOString().split('T')[0];}
function dl(d){return d?Math.ceil((new Date(d)-new Date())/86400000):9999;}
function sblAvail(s){return Math.max(0,s.qty_units-s.reserved_units-s.blocked_units);}
function expColor(d){return d<=15?'var(--ro)':d<=30?'var(--na)':d<=60?'#b8860b':'inherit';}
function stAlm(pid){return DB.stock_by_location.filter(function(s){var l=gL(s.location_id);return s.product_id===pid&&l&&l.zone==='ALM';}).reduce(function(t,s){return t+sblAvail(s);},0);}
function stPick(pid){var l=gL(gP(pid)?gP(pid).pick_loc:null);return l?l.stock_units:0;}
function stVal(pid){var pr=gP(pid);if(!pr)return 0;return DB.stock_by_location.filter(function(s){var l=gL(s.location_id);return s.product_id===pid&&l&&l.zone==='ALM';}).reduce(function(t,s){return t+sblAvail(s)*pr.cost;},0);}
function priN(c){return c==='A'?1:c==='B'?2:3;}
function distPick(loc,pid){var p=gP(pid);if(!p)return 9999;return Math.abs(loc.pi-p.pidx)*5+(loc.ci||0)*2+(loc.ni||0);}
function nearestFree(pid){var f=DB.locations.filter(function(l){return l.zone==='ALM'&&l.state==='LIBRE'&&l.active&&!l.blocked;});if(!f.length)return null;return f.sort(function(a,b){return distPick(a,pid)-distPick(b,pid);})[0];}
function fefoStock(pid){return DB.stock_by_location.filter(function(s){var l=gL(s.location_id);return s.product_id===pid&&l&&l.zone==='ALM'&&sblAvail(s)>0;}).map(function(s){return Object.assign({},s,{lot:gLot(s.lot_id),pal:gPal(s.pallet_id),loc:gL(s.location_id)});}).filter(function(s){return s.lot&&s.lot.status==='activo';}).sort(function(a,b){return new Date(a.lot.expiry_date)-new Date(b.lot.expiry_date);});}
function fefoSug(pid,qty){var st=fefoStock(pid),r=[],rem=qty;for(var i=0;i<st.length;i++){if(rem<=0)break;var u=Math.min(sblAvail(st[i]),rem);r.push(Object.assign({},st[i],{use:u}));rem-=u;}return r;}
function ordsPrio(fR,fC){fR=fR||'';fC=fC||'';return DB.orders.filter(function(o){return o.status==='PENDIENTE'&&(!fR||o.route_id===fR)&&(!fC||o.priority_class===fC);}).sort(function(a,b){var d=priN(a.priority_class)-priN(b.priority_class);return d||new Date(a.requested_ship_date)-new Date(b.requested_ship_date);});}
function alertasRep(){return REP_RULES.filter(function(r){return r.active;}).map(function(r){var pl=gL(gP(r.product_id)?gP(r.product_id).pick_loc:null),pr=gP(r.product_id);return Object.assign({},r,{loc:pl,product:pr,stock:pl?pl.stock_units:0});}).filter(function(r){return r.stock<r.min_pick_qty;});}
function cadAlerts(days){days=days||45;return DB.stock_by_location.filter(function(s){var l=gL(s.location_id);return l&&l.zone==='ALM'&&sblAvail(s)>0;}).map(function(s){return Object.assign({},s,{lot:gLot(s.lot_id),loc:gL(s.location_id)});}).filter(function(s){return s.lot&&dl(s.lot.expiry_date)<=days;}).sort(function(a,b){return new Date(a.lot.expiry_date)-new Date(b.lot.expiry_date);});}
function addMov(type,prod,lot,pal,fromL,toL,qty,scan,date){DB.movements.push({id:'MOV'+String(DB.seq.mov++).padStart(6,'0'),movement_type:type,movement_datetime:(date?new Date(date):new Date()).toISOString(),product_id:prod,lot_id:lot,pallet_id:pal,from_location_id:fromL,to_location_id:toL,quantity_units:qty,user_id:CU.id,scan_verified:scan||false});}

function recProvNombre(idp){var p=PROVS.find(function(x){return String(x.IdProv||'')===String(idp||'');});return p?p.Proveedor:'';}
function recUdPale(a){if(!a)return '';var cp=parseFloat(a['Cajas por Palet']);return isNaN(cp)?'':cp;}
function recUbicacionesLibres(n){return LOCATIONS.filter(function(l){return String(l.Estado||'').toLowerCase().indexOf('libre')>=0;}).slice(0,n);}

function recGuardarCampos(){
  var c=recCtx,g=function(id){var e=document.getElementById(id);return e?e.value:'';};
  c.prov=g('rPrv');c.provNombre=g('rPrvNom');c.desc=g('rDesc');c.fam=g('rFam');c.grupo=g('rGrupo');c.picking=g('rPicking');c.udpale=g('rUdPale');c.peso=g('rPeso');
  c.lote=g('rLote');c.cad=g('rCad');c.cant=g('rCant');c.npal=g('rNPal');
  c.tipopale=g('rTipoPale');c.muelle=g('rMuelle');c.trans=g('rTrans');c.obs=g('rObs');
}

// Cantidad recibida = cajas/palé × nº palés (editable)
function recCalcCant(){
  var ud=parseFloat((document.getElementById('rUdPale')||{}).value)||0;
  var np=parseInt((document.getElementById('rNPal')||{}).value)||0;
  var cantEl=document.getElementById('rCant');
  if(cantEl&&ud>0&&np>0){ cantEl.value=ud*np; recCtx.cant=ud*np; }
  recCtx.udpale=ud; recCtx.npal=np;
}

// Alta de transportista nuevo (se guarda en la tabla de Drive)
function recNuevoTransportista(){
  recGuardarCampos();
  var nombre=prompt('Nombre del nuevo transportista:');
  if(!nombre)return;
  nombre=nombre.trim(); if(!nombre)return;
  if(TRANSP.some(function(t){return String(t.Transportista||'').toLowerCase()===nombre.toLowerCase();})){
    toast('Ese transportista ya existe','warn'); recCtx.trans=nombre; recForm(); return;
  }
  var maxId=TRANSP.reduce(function(m,t){var n=parseInt(t.IdTransportistas)||0;return n>m?n:m;},0);
  TRANSP.push({id:String(maxId+1),IdTransportistas:String(maxId+1),Transportista:nombre,Observaciones:''});
  recCtx.trans=nombre;
  toast('Transportista añadido: '+nombre,'ok');
  guardarMaestroInmediato('Transportistas',TRANSP);
  recForm();
}

function recBuscarEAN(){
  if(recCtx.buscado)recGuardarCampos();
  var ean=(document.getElementById('rEAN')||{}).value||'';
  ean=String(ean).trim();
  if(!ean){toast('Escanea o teclea un EAN','warn');return;}
  var a=recArtPorEAN(ean);
  recCtx.ean=ean;recCtx.buscado=true;
  if(a){
    recCtx.encontrado=true;
    recCtx.desc=a.Descripcion_Producto||'';
    recCtx.fam=a.Familia||'';
    recCtx.grupo=a.Grupo||'';
    recCtx.picking=a.Picking||'';
    var idp=String(a['Id. Proveedor']||'');
    recCtx.prov=idp;
    recCtx.provNombre=recProvNombre(idp);
    recCtx.udpale=recUdPale(a);
    recCtx.peso=a['Peso Caja']||'';
    var np=parseInt(recCtx.npal)||1; var cp=parseFloat(recCtx.udpale)||0;
    if(cp>0)recCtx.cant=cp*np;
  }else{
    recCtx.encontrado=false;
    if(recCtx.desc===undefined)recCtx.desc='';
  }
  recForm();
}

function recConfirmar(){
  recGuardarCampos();
  var c=recCtx;
  if(!c.lote){toast('Falta el lote','warn');return;}
  if(!c.cad){toast('Falta la caducidad','warn');return;}
  var cant=parseInt(c.cant)||0; if(cant<=0){toast('Cantidad recibida no válida','warn');return;}
  var npal=parseInt(c.npal)||1; if(npal<1)npal=1;
  // Asignar ubicaciones libres, una por palé
  var libres=recUbicacionesLibres(npal);
  var pallets=[];
  var cantPorPale=Math.floor(cant/npal), resto=cant-cantPorPale*npal;
  var ts=new Date().toISOString();
  var idRec='R'+Date.now().toString().slice(-8);
  for(var i=0;i<npal;i++){
    var ub=libres[i]?libres[i].Ubicacion:'(sin ubicación libre)';
    if(libres[i]){libres[i].Estado='Ocupado';} // marca ocupada
    pallets.push({idPale:idRec+'-P'+(i+1),ubicacion:ub,cantidad:cantPorPale+(i<resto?1:0)});
  }
  var rec={
    IdRecepcion:idRec, Fecha_Hora_Recepcion:ts, EAN:c.ean, Descripcion:c.desc,
    NombreProveedor:c.provNombre||'', IdProveedor:c.prov||'', Lote:c.lote, FechaCaducidad:c.cad, Cantidad_Recibida:cant,
    Familia:c.fam||'', Grupo:c.grupo||'', Picking:c.picking||'',
    'NºPales':npal, TipoPale:c.tipopale||'', MuelleDescarga:c.muelle||'', Transportista:c.trans||'',
    IdPedido:c.idpedido||'', Id_Linea_Pedido:c.linea||'', Observaciones:c.obs||'',
    Estado_Recepcion:'RECEPCIONADO', Usuario:(typeof CU!=='undefined'&&CU?CU.name:''),
    PesoUnidad:c.peso||'', UnidadPale:c.udpale||'', pallets:pallets
  };
  RECEP.push(rec);
  // Actualizar pendiente del pedido si aplica
  if(c.idpedido&&c.linea){var ln=PEDIDOS.find(function(p){return String(p.Id_Linea_Pedido)===String(c.linea);});if(ln){ln.Cantidad_Recibida=(parseFloat(ln.Cantidad_Recibida)||0)+cant;ln.Cantidad_Pendiente=Math.max(0,(parseFloat(ln.CANTIDAD)||0)-ln.Cantidad_Recibida);if(ln.Cantidad_Pendiente<=0)ln.Estado_Pedido='COMPLETO';}}
  toast('Recepción registrada: '+npal+' palé(s)','ok',3500);
  recGuardarDrive();
  recCtx={}; recVerEtiquetas(idRec);
}

// Elimina una recepción (memoria + Drive), libera ubicaciones y revierte pendiente del pedido
function recEliminar(idRec){
  var r=RECEP.find(function(x){return x.IdRecepcion===idRec;});
  if(!r){toast('Recepción no encontrada','warn');return;}
  if(!confirm('¿Eliminar la recepción '+idRec+'?\nSe borrará también de Drive si estaba guardada.'))return;
  // Liberar ubicaciones asignadas
  if(r.pallets){r.pallets.forEach(function(p){var loc=LOCATIONS.find(function(l){return (l.Ubicacion===p.ubicacion)||(l.id===p.ubicacion);});if(loc)loc.Estado='Libre';});}
  // Revertir pendiente del pedido de compra si aplica
  if(r.Id_Linea_Pedido){var ln=PEDIDOS.find(function(p){return String(p.Id_Linea_Pedido)===String(r.Id_Linea_Pedido);});if(ln){ln.Cantidad_Recibida=Math.max(0,(parseFloat(ln.Cantidad_Recibida)||0)-(parseFloat(r.Cantidad_Recibida)||0));ln.Cantidad_Pendiente=Math.max(0,(parseFloat(ln.CANTIDAD)||0)-ln.Cantidad_Recibida);if(ln.Cantidad_Pendiente>0)ln.Estado_Pedido='PENDIENTE';}}
  RECEP=RECEP.filter(function(x){return x.IdRecepcion!==idRec;});
  toast('Recepción '+idRec+' eliminada','ok',3000);
  recGuardarDrive(); // reescribe Recepciones.json/Ubicaciones/Pedidos/backup/tablas en Drive (ya sin el registro)
  rRec();
}

// Guarda inmediatamente la recepción y datos relacionados en Drive
async function recGuardarDrive(){
  if(!gAccessToken){
    syncLog('⚠️ Recepción NO guardada en Drive: no estás conectado');
    toast('Recepción guardada en local. Conéctate a Drive (pestaña Drive) para sincronizar.','warn',6000);
    return;
  }
  try{
    syncLog('⬆️ Guardando recepción en Drive...');
    var carp=await driveCarpetas();
    await driveUpsert('Recepciones.json',RECEP,carp.maes);
    await driveUpsert('Pedidos.json',PEDIDOS,carp.maes);
    await driveUpsert('Ubicaciones.json',LOCATIONS,carp.maes);
    await driveUpsert(BACKUP_NAME,snapshotEstado(),carp.cop);
    await driveExportTablas();
    syncLog('✅ Recepción guardada en Drive ('+RECEP.length+' recepciones)');
    toast('Recepción guardada en Drive','ok',2500);
  }catch(e){
    syncLog('❌ Error guardando recepción: '+e.message);
    toast('Error guardando en Drive: '+e.message,'err',6000);
  }
}

function confirmScan(){
  var inp=document.getElementById('scanI');if(!inp)return;
  var sc=inp.value.trim().toUpperCase();
  if(sc===scanExpCode){
    document.getElementById('scanRes').innerHTML='<div class="alert alert-success p-2 mt-2"><i class="bi bi-check-circle-fill me-2"></i>Verificado</div>';

    document.getElementById('scanRes').innerHTML='<div class="alert alert-danger p-2 mt-2">Incorrecto. Esperado: <b>'+scanExpCode+'</b></div>';

// ============================================================
// CONTROL DE ALMACÉN (verificación + ubicación de mercancía existente)
// Flujo: escanear EAN caja → verificar descripción → localizar picking
// → sugerir hueco libre más cercano → ubicar (manual tiene PRIORIDAD)
// ============================================================
var ctlCtx={};

// Normaliza un código de ubicación para comparar (mayúsculas, sin espacios)
function ctlNorm(u){return String(u||'').trim().toUpperCase();}

// Busca una ubicación en LOCATIONS por código (Ubicacion o Ubicacion2)
function ctlLoc(code){
  var c=ctlNorm(code); if(!c)return null;
  return LOCATIONS.find(function(l){return ctlNorm(l.Ubicacion)===c||ctlNorm(l.Ubicacion2)===c;});
}

// Localiza la ubicación de PICKING de una referencia:
// 1º ubicación tipo Picking con ese EAN asignado · 2º campo Picking del maestro de artículos
function ctlPickingDe(ean,art){
  ean=String(ean||'').trim();
  var pick=LOCATIONS.find(function(l){
    var esPick=String(l.Tipo_Ubicacion||'').toLowerCase().indexOf('picking')>=0||String(l.Nivel)==='00';
    return esPick&&String(l.EAN||'').trim()===ean;
  });
  if(pick)return pick;
  if(art&&art.Picking){var byCode=ctlLoc(art.Picking);if(byCode)return byCode;}
  if(art&&art.Picking2){var byCode2=ctlLoc(art.Picking2);if(byCode2)return byCode2;}
  return null;
}

// Distancia física entre dos ubicaciones (formato A/01/03):
// pasillo distinto pesa mucho > diferencia de posición > altura
function ctlDist(a,b){
  var ua=parseUbic(a.Ubicacion||''),ub=parseUbic(b.Ubicacion||'');
  var dP=Math.abs((ua.pasillo.charCodeAt(0)||0)-(ub.pasillo.charCodeAt(0)||0));
  var dC=Math.abs((parseInt(ua.posicion,10)||0)-(parseInt(ub.posicion,10)||0));
  var dN=Math.abs((parseInt(ua.nivel,10)||0)-(parseInt(ub.nivel,10)||0));
  return dP*1000+dC*10+dN;
}

// Huecos libres (alturas, no picking) ordenados por cercanía a la ubicación de picking
function ctlHuecosCercanos(pickLoc,n){
  n=n||5;
  var libres=LOCATIONS.filter(function(l){
    var libre=String(l.Estado||'').toLowerCase().indexOf('libre')>=0;
    var esAltura=String(l.Nivel)!=='00'&&String(l.Tipo_Ubicacion||'').toLowerCase().indexOf('picking')<0;
    return libre&&esAltura;
  });
  if(!libres.length)return [];
  if(pickLoc){libres.sort(function(a,b){return ctlDist(a,pickLoc)-ctlDist(b,pickLoc);});}
  else{libres.sort(function(a,b){return (parseFloat(a.DistanciaPicking)||9999)-(parseFloat(b.DistanciaPicking)||9999);});}
  return libres.slice(0,n);
}

function ctlBuscarEAN(){
  var ean=String((document.getElementById('cEAN')||{}).value||'').trim();
  if(!ean){toast('Escanea o teclea un EAN','warn');return;}
  var art=recArtPorEAN(ean);
  var pickLoc=art?ctlPickingDe(ean,art):null;
  ctlCtx={ean:ean,buscado:true,art:art||null,pickLoc:pickLoc,sugerencias:art?ctlHuecosCercanos(pickLoc,5):[],cant:1};
  rCtl();
}

function ctlConfirmar(){
  var c=ctlCtx;
  if(!c.art){toast('Primero escanea un EAN válido','warn');return;}
  c.ubicManErr='';
  var manual=ctlNorm(c.ubicMan);
  var loc=null, modo='';
  if(manual){
    loc=ctlLoc(manual);
    if(!loc){c.ubicManErr='La ubicación <b>'+manual+'</b> no existe en el mapa de almacén. Revísala o impórtala en Maestros → Ubicaciones.';rCtl();return;}
    if(String(loc.Estado||'').toLowerCase().indexOf('ocupado')>=0&&!confirm('La ubicación '+loc.Ubicacion+' figura como OCUPADA.\n¿Confirmar igualmente y sobrescribir?'))return;
    modo='MANUAL';
  }else{
    var auto=c.autoSel||(c.sugerencias&&c.sugerencias[0]?c.sugerencias[0].Ubicacion:'');
    if(!auto){toast('No hay hueco sugerido ni ubicación manual','warn');return;}
    loc=ctlLoc(auto);
    if(!loc){toast('Ubicación sugerida no encontrada','err');return;}
    modo='AUTO';
  }
  // Marcar hueco ocupado y asociar la referencia al hueco (acelera futuros controles)
  loc.Estado='Ocupado';
  loc.EAN=c.ean;
  if(!loc.Descripcion)loc.Descripcion=c.art.Descripcion_Producto||'';
  var id='CT'+Date.now().toString().slice(-8);
  CONTROLES.push({
    IdControl:id, Fecha_Hora:new Date().toISOString(), EAN:c.ean,
    IdArticulo:c.art.IdArticulos||'', Descripcion:c.art.Descripcion_Producto||'',
    UbicacionPicking:c.pickLoc?c.pickLoc.Ubicacion:'', UbicacionAsignada:loc.Ubicacion,
    Modo:modo, Cantidad:parseInt(c.cant)||1, Observaciones:c.obs||'',
    Usuario:(typeof CU!=='undefined'&&CU?CU.name:'')
  });
  toast('Hueco '+loc.Ubicacion+' confirmado como OCUPADO ('+modo+')','ok',3500);
  ctlGuardarDrive();
  ctlCtx={};
  ctlVerEtiqueta(id);
}

function ctlEliminar(id){
  var x=CONTROLES.find(function(k){return k.IdControl===id;});
  if(!x)return;
  if(!confirm('¿Anular el control '+id+'?\nSe liberará el hueco '+x.UbicacionAsignada+'.'))return;
  var loc=ctlLoc(x.UbicacionAsignada);
  if(loc){loc.Estado='Libre';if(String(loc.EAN||'').trim()===String(x.EAN||'').trim())loc.EAN='';}
  CONTROLES=CONTROLES.filter(function(k){return k.IdControl!==id;});
  toast('Control anulado · hueco liberado','ok');
  ctlGuardarDrive();
  rCtl();
}

// Guarda controles + ubicaciones + backup en Drive
async function ctlGuardarDrive(){
  if(!gAccessToken){toast('Guardado en local. Conéctate a Drive para sincronizar.','warn',5000);return;}
  try{
    var carp=await driveCarpetas();
    await driveUpsert('Controles.json',CONTROLES,carp.maes);
    await driveUpsert('Ubicaciones.json',LOCATIONS,carp.maes);
    await driveUpsert(BACKUP_NAME,snapshotEstado(),carp.cop);
    syncLog('✅ Control guardado en Drive ('+CONTROLES.length+' controles)');
  }catch(e){syncLog('❌ Error guardando control: '+e.message);toast('Error guardando en Drive: '+e.message,'err',6000);}
}

// ============================================================
function almEsPick(l){return String(l.Nivel)==='00'||String(l.Tipo_Ubicacion||'').toLowerCase().indexOf('picking')>=0;}
function almLibre(l){return String(l.Estado||'').toLowerCase().indexOf('libre')>=0;}
function almOcupada(l){return String(l.Estado||'').toLowerCase().indexOf('ocupado')>=0;}
function almBloq(l){return String(l.Estado||'').toLowerCase().indexOf('bloq')>=0;}
// Pasillos y niveles reales existentes en el maestro (con filtro de almacén si aplica)
function almFiltradas(){return LOCATIONS.filter(function(l){return !mapAlm||String(l.Almacen||'')===mapAlm;});}
function almPasillos(){var s={};almFiltradas().forEach(function(l){if(l.Pasillo)s[l.Pasillo]=1;});return Object.keys(s).sort();}
function almNiveles(pas){var s={};almFiltradas().forEach(function(l){if(l.Pasillo===pas&&l.Nivel!==''&&l.Nivel!=null)s[String(l.Nivel)]=1;});return Object.keys(s).sort();}

function rAlm(){
  // Sin maestro cargado → guiar a importar el LayOut
  if(!LOCATIONS.length){
    var h0='<div class="sec"><i class="bi bi-grid-3x3-gap me-2"></i>Mapa de Almacén</div>';
    h0+='<div class="card"><div class="card-body text-center py-5">';
    h0+='<i class="bi bi-map" style="font-size:42px;color:#aab"></i>';
    h0+='<div class="fw-bold mt-2" style="font-size:14px">No hay ubicaciones cargadas</div>';
    h0+='<div class="text-muted mb-3" style="font-size:11px">El mapa se construye desde el maestro de Ubicaciones (hoja LayOut de DaltGestionOk.xlsx).</div>';
    h0+='<input type="file" id="fileMapaAlm" accept=".xlsx,.xls" style="display:none" onchange="importarMapaAlmacen(this)">';
    h0+='<button class="btn btn-primary btn-sm me-2" onclick="document.getElementById(\'fileMapaAlm\').click()"><i class="bi bi-upload me-1"></i>Importar Mapa (LayOut)</button>';
    h0+='<button class="btn btn-outline-secondary btn-sm" onclick="navv(\'mae\');maeTab=\'ubi\';rMae()"><i class="bi bi-database-gear me-1"></i>Ir a Maestros</button>';
    h0+='</div></div>';
    document.getElementById('v-alm').innerHTML=h0;
    return;
  }
  var ubis=almFiltradas();
  var picks=ubis.filter(almEsPick), alturas=ubis.filter(function(l){return !almEsPick(l);});
  var lib=alturas.filter(almLibre).length, ocp=alturas.filter(almOcupada).length, blq=ubis.filter(almBloq).length;
  var pctOcp=alturas.length?Math.round(ocp/alturas.length*100):0;

  // Normalizar selección de pasillo/nivel a valores existentes
  var pass=almPasillos();
  if(pass.indexOf(mapPas)<0)mapPas=pass[0]||'';
  var nivs=almNiveles(mapPas);
  if(nivs.indexOf(String(mapNiv))<0)mapNiv=nivs[0]||'';

  var h='<div class="sec"><i class="bi bi-grid-3x3-gap me-2"></i>Mapa de Almacén <span class="text-muted" style="font-size:11px;font-weight:400">· Maestro de Ubicaciones (LayOut)</span></div>';

  // ── Barra de acciones ──────────────────────────────────────
  h+='<div class="d-flex flex-wrap gap-2 align-items-center mb-3 p-2 rounded" style="background:#f0f4ff;border:1px solid #d0d8f0">';
  h+='<span class="badge bg-secondary" style="font-size:10px">'+ubis.length+' ubic. totales</span>';
  h+='<span class="badge bg-info text-dark" style="font-size:10px">'+picks.length+' picking</span>';
  h+='<span class="badge bg-success" style="font-size:10px">'+lib+' huecos libres</span>';
  h+='<span class="badge bg-danger" style="font-size:10px">'+ocp+' ocupados</span>';
  if(blq)h+='<span class="badge" style="font-size:10px;background:var(--ro)">'+blq+' bloqueadas</span>';
  // Filtro de almacén (si el LayOut distingue varios)
  var setA={};LOCATIONS.forEach(function(l){if(l.Almacen)setA[l.Almacen]=1;});
  var alms=Object.keys(setA).sort();
  if(alms.length>1){
    h+='<select class="form-select form-select-sm" style="width:auto;font-size:11px" onchange="mapAlm=this.value;rAlm()"><option value="">Todos los almacenes</option>';
    alms.forEach(function(a){h+='<option value="'+a+'"'+(mapAlm===a?' selected':'')+'>'+a+'</option>';});
    h+='</select>';
  }
  h+='<div class="ms-auto d-flex gap-2">';
  h+='<input type="file" id="fileMapaAlm" accept=".xlsx,.xls" style="display:none" onchange="importarMapaAlmacen(this)">';
  h+='<button class="btn btn-sm" style="background:var(--vio);color:#fff;font-size:11px;font-weight:600" onclick="document.getElementById(\'fileMapaAlm\').click()"><i class="bi bi-upload me-1"></i>Importar Mapa</button>';
  h+='<button class="btn btn-sm" style="background:#217346;color:#fff;font-size:11px;font-weight:600" onclick="openExpLayout()"><i class="bi bi-file-earmark-excel me-1"></i>Exportar</button>';
  h+='</div></div>';

  // ── KPIs ──────────────────────────────────────────────────
  h+='<div class="row g-2 mb-2">';
  h+='<div class="col-6 col-md-2"><div class="card text-center p-2"><div style="font-size:10px;color:#666">UBICACIONES</div><div style="font-size:22px;font-weight:700">'+ubis.length+'</div></div></div>';
  h+='<div class="col-6 col-md-2"><div class="card text-center p-2"><div style="font-size:10px;color:#666">PICKING</div><div style="font-size:22px;font-weight:700;color:var(--azc)">'+picks.length+'</div></div></div>';
  h+='<div class="col-6 col-md-2"><div class="card text-center p-2"><div style="font-size:10px;color:#666">ALTURAS</div><div style="font-size:22px;font-weight:700">'+alturas.length+'</div></div></div>';
  h+='<div class="col-6 col-md-2"><div class="card text-center p-2"><div style="font-size:10px;color:#666">LIBRES</div><div style="font-size:22px;font-weight:700;color:var(--gn)">'+lib+'</div></div></div>';
  h+='<div class="col-6 col-md-2"><div class="card text-center p-2"><div style="font-size:10px;color:#666">OCUPADOS</div><div style="font-size:22px;font-weight:700;color:var(--ro)">'+ocp+'</div></div></div>';
  h+='<div class="col-6 col-md-2"><div class="card text-center p-2"><div style="font-size:10px;color:#666">% OCUP.</div><div style="font-size:22px;font-weight:700;color:var(--az)">'+pctOcp+'%</div></div></div>';
  h+='</div>';

  // ── Selector de pasillo y nivel (dinámico según el maestro) ─
  h+='<div class="card mb-2 p-2"><div class="d-flex align-items-center gap-2 flex-wrap">';
  h+='<span style="font-size:11px;font-weight:600">Pasillo:</span>';
  pass.forEach(function(p){
    var sl=ubis.filter(function(l){return l.Pasillo===p&&!almEsPick(l);});
    var pOcp=sl.filter(almOcupada).length;
    var pct=sl.length?Math.round(pOcp/sl.length*100):0;
    h+='<button class="btn btn-sm '+(mapPas===p?'btn-primary':'btn-outline-secondary')+'" style="padding:2px 10px;font-size:11px" onclick="mapPas=\''+p+'\';rAlm()">'+p;
    h+='<span style="font-size:8px;display:block;line-height:1;color:'+(mapPas===p?'rgba(255,255,255,.8)':'#888')+'">'+pct+'%</span></button>';
  });
  h+='<span style="font-size:11px;font-weight:600;margin-left:6px">Nivel:</span>';
  nivs.forEach(function(n){
    var lbl=n==='00'?'00 · Picking':'N'+n;
    h+='<button class="btn btn-sm '+(String(mapNiv)===n?(n==='00'?'btn-info':'btn-primary'):(n==='00'?'btn-outline-info':'btn-outline-secondary'))+'" style="padding:2px 8px;font-size:11px" onclick="mapNiv=\''+n+'\';rAlm()">'+lbl+'</button>';
  });
  h+='</div></div>';

  // ── Mapa del pasillo/nivel seleccionado ────────────────────
  var slots=ubis.filter(function(l){return l.Pasillo===mapPas&&String(l.Nivel)===String(mapNiv);});
  h+='<div class="card mb-2"><div class="ch d-flex justify-content-between align-items-center">';
  h+='<span><i class="bi bi-grid-3x3 me-2"></i>Pasillo '+mapPas+' · Nivel '+mapNiv+(String(mapNiv)==='00'?' (Picking)':'')+'</span>';
  h+='<span style="font-size:10px;opacity:.85">'+slots.filter(almLibre).length+' libres · '+slots.filter(almOcupada).length+' ocupados</span>';
  h+='</div><div class="card-body p-3">';
  h+=String(mapNiv)==='00'?rPickGrid(slots):rStorGrid(slots);
  h+='</div></div>';

  // ── Leyenda ────────────────────────────────────────────────
  h+='<div class="d-flex gap-4 flex-wrap align-items-center" style="font-size:11px">';
  h+='<span><span class="slot sl" style="width:14px;height:11px;display:inline-flex"></span> Libre</span>';
  h+='<span><span class="slot so" style="width:14px;height:11px;display:inline-flex"></span> Ocupado</span>';
  h+='<span><span class="slot sp" style="width:14px;height:11px;display:inline-flex"></span> Picking</span>';
  h+='<span><span class="slot sbl" style="width:14px;height:11px;display:inline-flex"></span> Bloqueado</span>';
  h+='<span class="text-muted ms-auto">Impar = lado Izquierdo · Par = lado Derecho · Clic en un hueco para ver detalle</span>';
  h+='</div>';

  document.getElementById('v-alm').innerHTML=h;
}

// Grid de picking (nivel 00): tarjetas con la referencia asignada a cada ubicación
function rPickGrid(slots){
  if(!slots.length)return '<div class="text-muted text-center py-4">Sin ubicaciones de picking en este pasillo</div>';
  slots=slots.slice().sort(function(a,b){return (parseInt(a.Estanteria,10)||0)-(parseInt(b.Estanteria,10)||0);});
  var h='<div class="row g-2">';
  slots.forEach(function(u){
    var art=String(u.EAN||'').trim()?recArtPorEAN(String(u.EAN).trim()):null;
    var desc=art?art.Descripcion_Producto:(u.Descripcion||'');
    var vacio=!String(u.EAN||'').trim();
    h+='<div class="col-6 col-md-4 col-lg-3"><div class="card border-2 '+(almBloq(u)?'border-danger':vacio?'border-secondary':'border-info')+' p-2" style="cursor:pointer;background:'+(vacio?'#fafafa':'#f0f8ff')+'" onclick="showSlot(\''+String(u.Ubicacion).replace(/'/g,"\\'")+'\')">';
    h+='<div class="d-flex justify-content-between mb-1"><span class="fw-bold" style="font-size:12px">'+u.Ubicacion+'</span>'+(almBloq(u)?'<span class="badge bg-danger" style="font-size:9px">⛔</span>':'')+'</div>';
    h+='<div style="font-size:9px;color:#555">'+(u.EAN||'— sin referencia —')+'</div>';
    h+='<div style="font-size:10px;font-weight:600;margin:1px 0;min-height:13px">'+String(desc||'').substring(0,26)+'</div>';
    h+='<div style="font-size:9px;color:#888">'+(u.Lado||'')+(u.Capacidad?' · Cap. '+u.Capacidad:'')+'</div>';
    h+='</div></div>';
  });
  h+='</div>';return h;
}

// Grid de alturas: dos filas físicas del pasillo (Impar=Izquierda arriba, Par=Derecha abajo)
function rStorGrid(slots){
  if(!slots.length)return '<div class="text-muted text-center py-4">Sin ubicaciones en este pasillo/nivel</div>';
  function fila(lado,arr){
    arr=arr.slice().sort(function(a,b){return (parseInt(a.Estanteria,10)||0)-(parseInt(b.Estanteria,10)||0);});
    var f='<div style="font-size:10px;color:#666;margin:6px 0 3px;font-weight:600">'+lado+' ('+arr.length+')</div><div style="display:flex;flex-wrap:wrap;gap:2px">';
    arr.forEach(function(u){
      var cls=almBloq(u)?'sbl':almLibre(u)?'sl':'so';
      var tip=u.Ubicacion+(u.EAN?' · '+u.EAN:'')+(u.Descripcion?' · '+u.Descripcion:'');
      f+='<div class="slot '+cls+'" title="'+String(tip).replace(/"/g,'&quot;')+'" onclick="showSlot(\''+String(u.Ubicacion).replace(/'/g,"\\'")+'\')" style="flex-direction:column"><div style="font-size:8px;font-weight:700">'+String(u.Estanteria||'').padStart(2,'0')+'</div></div>';
    });
    return f+'</div>';
  }
  var imp=slots.filter(function(l){return (parseInt(l.Estanteria,10)||0)%2===1;});
  var par=slots.filter(function(l){return (parseInt(l.Estanteria,10)||0)%2===0;});
  return fila('Lado Izquierdo · posiciones impares',imp)+fila('Lado Derecho · posiciones pares',par);
}

// Detalle de una ubicación del maestro (clic en el mapa)
function showSlot(cod){
  var u=ctlLoc(cod);if(!u){toast('Ubicación no encontrada en el maestro','warn');return;}
  var art=String(u.EAN||'').trim()?recArtPorEAN(String(u.EAN).trim()):null;
  var h='<div class="fw-bold text-primary mb-1" style="font-size:15px">'+u.Ubicacion+'</div>';
  h+='<span class="badge '+(almEsPick(u)?'bg-info text-dark':'bg-secondary')+' me-1" style="font-size:9px">'+(u.Tipo_Ubicacion||(almEsPick(u)?'Picking':'Altura'))+'</span>';
  h+='<span class="badge '+(almBloq(u)?'bg-danger':almLibre(u)?'bg-success':'bg-warning text-dark')+'" style="font-size:9px">'+(u.Estado||'—')+'</span>';
  h+='<div class="mt-2" style="font-size:12px"><b>Pasillo:</b> '+(u.Pasillo||'—')+' · <b>Pos:</b> '+(u.Estanteria||'—')+' ('+(u.Lado||'—')+') · <b>Niv:</b> '+(u.Nivel||'—')+'</div>';
  if(u.Almacen)h+='<div style="font-size:12px"><b>Almacén:</b> '+u.Almacen+(u.Zona?' · <b>Zona:</b> '+u.Zona:'')+'</div>';
  if(u.Capacidad)h+='<div style="font-size:12px"><b>Capacidad:</b> '+u.Capacidad+'</div>';
  h+='<hr class="my-2">';
  if(String(u.EAN||'').trim()){
    h+='<div style="font-size:12px"><b>EAN:</b> <code>'+u.EAN+'</code></div>';
    h+='<div style="font-size:12px"><b>Artículo:</b> '+(art?art.Descripcion_Producto:(u.Descripcion||'—'))+'</div>';
    if(art)h+='<div style="font-size:11px;color:#666">Ref: '+(art.IdArticulos||'—')+' · Rotación: '+(art.Rotacion||'—')+' · Picking maestro: '+(art.Picking||'—')+'</div>';
  }else{
    h+='<div class="text-muted text-center py-2" style="font-size:11px">Sin referencia asignada</div>';
  }
  h+='<div class="d-flex gap-1 mt-2">';
  if(almLibre(u)){h+='<button class="btn btn-sm btn-outline-danger flex-grow-1" onclick="almToggleEstado(\''+String(u.Ubicacion).replace(/'/g,"\\'")+'\',\'Ocupado\')"><i class="bi bi-box-seam me-1"></i>Marcar Ocupado</button>';}
  else{h+='<button class="btn btn-sm btn-outline-success flex-grow-1" onclick="almToggleEstado(\''+String(u.Ubicacion).replace(/'/g,"\\'")+'\',\'Libre\')"><i class="bi bi-unlock me-1"></i>Marcar Libre</button>';}
  h+='<button class="btn btn-sm btn-outline-primary flex-grow-1" onclick="closeModal(\'mSlot\');editarMaestro(\'ubi\',\''+String(u.id).replace(/'/g,"\\'")+'\')"><i class="bi bi-pencil me-1"></i>Editar ficha</button>';
  h+='</div>';
  document.getElementById('mSlotTit').textContent=u.Ubicacion;
  document.getElementById('mSlotBody').innerHTML=h;
  bsModal('mSlot').show();
}

// Cambia el estado de un hueco desde el mapa y lo guarda en Drive (Ubicaciones.json)
function almToggleEstado(cod,estado){
  var u=ctlLoc(cod);if(!u)return;
  u.Estado=estado;
  if(estado==='Libre'&&!almEsPick(u))u.EAN='';
  toast(u.Ubicacion+' → '+estado,'ok');
  guardarMaestroInmediato('Ubicaciones',LOCATIONS);
  closeModal('mSlot');
  rAlm();
}

// ── Exportaciones del mapa (sobre el maestro real) ───────────
function openExpLayout(){
  var tot=LOCATIONS.length;
  var pick=LOCATIONS.filter(almEsPick).length;
  var ocp=LOCATIONS.filter(almOcupada).length;
  var h='<div class="p-3">';
  h+='<div class="alert alert-light p-2 mb-3" style="font-size:11px"><i class="bi bi-info-circle me-1 text-primary"></i>';
  h+='Mapa de almacén: <b>'+tot+'</b> ubicaciones · <b>'+pick+'</b> picking · <b>'+ocp+'</b> ocupadas ahora.</div>';
  h+='<div class="row g-3 justify-content-center">';
  var ops=[
    {label:'Layout Completo',sub:'Las '+tot+' ubicaciones con los 31 campos del LayOut',fn:'expLayout()',icon:'bi-grid-3x3-gap',col:'#217346'},
    {label:'Solo Alturas',sub:'Huecos de almacenaje (niveles 01+) con su estado',fn:'expLayoutZone(\'ALM\')',icon:'bi-boxes',col:'var(--az)'},
    {label:'Solo Picking',sub:'Ubicaciones nivel 00 con referencia asignada',fn:'expLayoutZone(\'PICK\')',icon:'bi-grid',col:'var(--azc)'},
    {label:'Ubicaciones Libres',sub:'Huecos disponibles para asignación',fn:'expLayoutFree()',icon:'bi-square',col:'var(--gn)'},
    {label:'Ubicaciones Ocupadas',sub:'Huecos ocupados con EAN y descripción',fn:'expLayoutOcc()',icon:'bi-box-seam',col:'var(--na)'}
  ];
  ops.forEach(function(op){
    h+='<div class="col-12 col-md-6"><button class="btn w-100 d-flex align-items-center gap-3 py-3 px-3" style="background:#f8f9fa;border:1px solid #dee2e6;border-radius:10px;text-align:left" onclick="'+op.fn+';closeModal(\'mExp\')">';
    h+='<i class="bi '+op.icon+'" style="font-size:24px;color:'+op.col+';flex-shrink:0"></i>';
    h+='<div><div style="font-weight:700;font-size:12px">'+op.label+'</div><div style="font-size:10px;color:#666">'+op.sub+'</div></div>';
    h+='</button></div>';
  });
  h+='</div></div>';
  document.getElementById('mExpBody').innerHTML=h;
  bsModal('mExp').show();
}

var ALM_EXP_COLS=['Ubicacion','Almacen','Zona','Pasillo','Estanteria','Nivel','Lado','Par/Impar','Tipo_Ubicacion','Estado','Capacidad','EAN','Descripcion'];
function almExpRows(lista){
  var rows=[ALM_EXP_COLS.slice()];
  lista.forEach(function(l){rows.push(ALM_EXP_COLS.map(function(c){var v=l[c];return (v==null)?'':v;}));});
  return rows;
}
function expLayoutZone(zone){
  var lista=LOCATIONS.filter(function(l){return zone==='PICK'?almEsPick(l):!almEsPick(l);});
  expXL(almExpRows(lista),zone==='PICK'?'Picking':'Alturas','Layout_'+(zone==='PICK'?'Picking':'Alturas'));
}
function expLayoutFree(){
  expXL(almExpRows(LOCATIONS.filter(function(l){return almLibre(l)&&!almEsPick(l);})),'UbicLibres','Layout_UbicacionesLibres');
}
function expLayoutOcc(){
  expXL(almExpRows(LOCATIONS.filter(almOcupada)),'UbicOcupadas','Layout_UbicacionesOcupadas');
}

  var pp=ordsPrio(pedFR,pedFC),hasSel=selOrds.length>0;

  if(hasSel){h+='<div class="ola-bar"><span><i class="bi bi-layers me-2"></i><b>'+selOrds.length+'</b> pedidos seleccionados</span><button class="btn btn-sm btn-light" onclick="openWave()"><i class="bi bi-play-fill me-1"></i>Crear Ola de Picking</button></div>';}
  h+='<div class="d-flex gap-1 mb-2 flex-wrap align-items-center">';
  h+='<span style="font-size:11px;font-weight:600">Ruta:</span>';
  h+='<button class="btn btn-sm '+(pedFR===''?'btn-primary':'btn-outline-secondary')+'" style="font-size:11px;padding:3px 8px" onclick="pedFR=\'\';rPed()">Todas</button>';
  ROUTES.forEach(function(r){h+='<button class="btn btn-sm '+(pedFR===r.id?'btn-primary':'btn-outline-secondary')+'" style="font-size:11px;padding:3px 8px" onclick="pedFR=\''+r.id+'\';rPed()">'+r.name+'</button>';});

  h+='<button class="btn btn-sm btn-success ms-auto" onclick="openNewPed()"><i class="bi bi-plus-lg me-1"></i>Nuevo</button>';
  h+='</div>';
  h+='<div class="card mb-2"><div class="ch d-flex justify-content-between align-items-center"><span><i class="bi bi-list-ol me-2"></i>Pendientes — A→B→C</span><div class="d-flex gap-1"><span class="bA">A</span><span class="bB ms-1">B</span><span class="bC ms-1">C</span></div></div>';
  h+='<div class="card-body p-0"><div class="table-responsive"><table class="table tbl table-hover mb-0"><thead style="font-size:11px;background:#f5f7fa"><tr>';

var invF={q:'',rot:'',cad:''};
function invMatch(o){
  var q=(invF.q||'').toUpperCase();
  if(q){var txt=((o.sku||'')+' '+(o.ean||'')+' '+(o.desc||'')+' '+(o.lot||'')+' '+(o.loc||'')).toUpperCase();if(txt.indexOf(q)<0)return false;}
  if(invF.rot&&o.rot!==invF.rot)return false;
  if(invF.cad&&o.dias!=null){var d=o.dias;if(invF.cad==='15'&&d>15)return false;if(invF.cad==='45'&&d>45)return false;if(invF.cad==='ok'&&d<=45)return false;}
  return true;
}

// Importador genérico INCREMENTAL (upsert): añade nuevos, actualiza los que cambian, ignora los iguales
function importarHojaExcel(input, sheetPref, campos, keyCampo, getArr, setArr){
  var file=input.files&&input.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){toast('XLSX no disponible','err');return;}
  var rd=new FileReader();
  rd.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var sn=wb.SheetNames.find(function(n){return n.toLowerCase()===sheetPref.toLowerCase();});
      if(!sn){ sn=wb.SheetNames.find(function(n){var hd=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1})[0]||[];return hd.map(String).indexOf(keyCampo)>=0;}); }
      if(!sn){toast('No se encontró la hoja "'+sheetPref+'"','err',6000);input.value='';return;}
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});
      var existentes=getArr()||[];
      var idx={}; existentes.forEach(function(o,i){idx[o.id]=i;});
      var nuevos=0, actualizados=0, iguales=0, vacios=0;
      rows.forEach(function(r){
        var k=(r[keyCampo]!=null?String(r[keyCampo]).trim():'');
        if(!k){vacios++;return;}
        var o={id:k}; campos.forEach(function(c){o[c]=(r[c]!=null?r[c]:'');});
        if(idx[k]==null){ existentes.push(o); idx[k]=existentes.length-1; nuevos++; }
        else {
          var prev=existentes[idx[k]];
          if(JSON.stringify(prev)!==JSON.stringify(o)){ existentes[idx[k]]=o; actualizados++; }
          else iguales++;
        }
      });
      setArr(existentes);
      var msg=sheetPref+': +'+nuevos+' nuevos · '+actualizados+' actualizados · '+iguales+' sin cambios';
      toast(msg,'ok',5000);
      guardarMaestroInmediato(sheetPref, existentes);
      try{driveAutoSave();}catch(e2){}
      rMae();
    }catch(err){toast('Error importando: '+err.message,'err',6000);}
    input.value='';
  };
  rd.readAsArrayBuffer(file);
}

// Interpreta el código de ubicación A/01/03 → pasillo, posición, nivel, lado, tipo
// Nivel 00 = Picking (primer nivel) · 01,02,03... = alturas · posición impar = izquierda, par = derecha
function parseUbic(code){
  code=String(code||'').trim();
  var p=code.split('/');
  var pasillo=p[0]||'', pos=p[1]||'', niv=p[2]||'';
  var posN=parseInt(pos,10);
  var lado=isNaN(posN)?'':(posN%2===1?'Izquierda':'Derecha');
  var par=isNaN(posN)?'':(posN%2===1?'Impar':'Par');
  var tipo=(niv==='00'||niv===0)?'Picking':'Altura';
  return {pasillo:pasillo,posicion:pos,nivel:niv,lado:lado,parimpar:par,tipo:tipo};
}
// Rellena los campos derivados de una ubicación a partir de su código (si están vacíos)
function derivarUbic(o){
  var u=parseUbic(o.Ubicacion);
  if(!o.Pasillo)o.Pasillo=u.pasillo;
  if(!o.Estanteria)o.Estanteria=u.posicion;
  if(o.Nivel===''||o.Nivel==null)o.Nivel=u.nivel;
  if(!o.Lado)o.Lado=u.lado;
  if(!o['Par/Impar'])o['Par/Impar']=u.parimpar;
  if(!o.Tipo_Ubicacion)o.Tipo_Ubicacion=u.tipo;
  return o;
}

// Importa la hoja LayOut con los 31 campos directamente a LOCATIONS
function importarMapaAlmacen(input){
  var file=input.files&&input.files[0];
  if(!file){return;}
  if(typeof XLSX==='undefined'){toast('XLSX no disponible','err');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      // Buscar la hoja LayOut; si no, la primera que tenga columna "Ubicacion"
      var sheetName=wb.SheetNames.find(function(n){return n.toLowerCase()==='layout';});
      if(!sheetName){
        sheetName=wb.SheetNames.find(function(n){
          var hdr=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1})[0]||[];
          return hdr.map(String).some(function(x){return x.toLowerCase()==='ubicacion';});
        });
      }
      if(!sheetName){toast('No se encontró hoja LayOut ni columna "Ubicacion"','err',6000);return;}
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:'',raw:false});
      var nuevas=[];
      rows.forEach(function(r){
        var u=(r['Ubicacion']!=null?String(r['Ubicacion']).trim():'');
        if(!u)return; // saltar filas sin ubicación
        var obj={id:u};
        MAPA_CAMPOS.forEach(function(c){ obj[c]=(r[c]!=null?r[c]:''); });
        derivarUbic(obj);
        nuevas.push(obj);
      });
      if(!nuevas.length){toast('La hoja no contiene ubicaciones válidas','warn',5000);return;}
      var idx={}; LOCATIONS.forEach(function(o,i){idx[o.id]=i;});
      var nuevos=0,actualizados=0,iguales=0;
      nuevas.forEach(function(o){
        if(idx[o.id]==null){LOCATIONS.push(o);idx[o.id]=LOCATIONS.length-1;nuevos++;}
        else{var prev=LOCATIONS[idx[o.id]];if(JSON.stringify(prev)!==JSON.stringify(o)){LOCATIONS[idx[o.id]]=o;actualizados++;}else iguales++;}
      });
      toast('Mapa de almacén: +'+nuevos+' nuevas · '+actualizados+' actualizadas · '+iguales+' sin cambios','ok',5000);
      guardarMaestroInmediato('Ubicaciones', LOCATIONS);
      try{driveAutoSave();}catch(e2){}
      rMae();
      var va=document.getElementById('v-alm'); if(va&&va.classList.contains('act'))rAlm();
    }catch(err){toast('Error importando mapa: '+err.message,'err',6000);}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

// ===== ESCÁNER DE CÁMARA (QR + códigos de barras) =====
var _qrScanner=null;
function escanearACampo(fieldId){
  abrirEscaner(function(code){
    var f=document.getElementById(fieldId);
    if(f){ f.value=code; f.dispatchEvent(new Event('input')); }
    var b=document.getElementById('pdaBtn'); if(b) setTimeout(function(){b.click();},150);
  });
}
function abrirEscaner(onCode){
  if(location.protocol!=='https:'){ toast('La cámara requiere HTTPS. Abre la app desde https://...github.io','err',7000); return; }
  if(typeof Html5Qrcode==='undefined'){ toast('Escáner aún cargando, reinténtalo en un segundo','warn',4000); return; }
  // Overlay a pantalla completa
  var ov=document.createElement('div');
  ov.id='scanOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:3000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center';
  ov.innerHTML='<div style="color:#fff;font-size:14px;margin-bottom:10px"><i class="bi bi-upc-scan me-2"></i>Apunta al código (QR o barras)</div>'+
    '<div id="scanCam" style="width:92%;max-width:420px;border-radius:10px;overflow:hidden;background:#111"></div>'+
    '<button id="scanClose" class="btn btn-light mt-3" style="padding:10px 24px"><i class="bi bi-x-lg me-1"></i>Cerrar</button>'+
    '<div id="scanMsg" style="color:#bbb;font-size:11px;margin-top:8px">Iniciando cámara...</div>';
  document.body.appendChild(ov);
  function cerrar(){
    try{ if(_qrScanner){ _qrScanner.stop().then(function(){_qrScanner.clear();_qrScanner=null;}).catch(function(){_qrScanner=null;}); } }catch(e){_qrScanner=null;}
    var o=document.getElementById('scanOverlay'); if(o)o.remove();
  }
  document.getElementById('scanClose').onclick=cerrar;
  _qrScanner=new Html5Qrcode('scanCam', { verbose:false });
  _qrScanner.start(
    { facingMode:'environment' },
    { fps:10, qrbox:{width:240,height:160} },
    function(decodedText){
      try{ navigator.vibrate&&navigator.vibrate(80); }catch(e){}
      cerrar();
      onCode(String(decodedText).trim());
    },
    function(){}
  ).then(function(){
    var m=document.getElementById('scanMsg'); if(m)m.textContent='Cámara activa — apunta al código';
  }).catch(function(err){
    var m=document.getElementById('scanMsg'); if(m)m.innerHTML='<span style="color:#ff6b6b">No se pudo abrir la cámara: '+err+'</span>';
  });
}

function impOpenFile(type){var el=document.getElementById('impFile_'+type);if(el){el.value='';el.click();}}

function impReadFile(type,input){
  if(!input.files||!input.files[0])return;
  toast('Leyendo archivo...','info',1500);
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false,dateNF:'YYYY-MM-DD'});
      if(!raw||raw.length<2){toast('Archivo sin datos suficientes','err');return;}
      var hdrs=raw[0].map(function(h){return String(h||'').trim();});
      var rows=raw.slice(1).filter(function(r){return r.some(function(cel){return String(cel||'').trim()!=='';});});
      impCtx={type:type,headers:hdrs,rows:rows,mapping:{}};
      impAutoMap(type,hdrs);
      impBuildModal(type);
    }catch(ex){toast('Error al leer: '+ex.message,'err',5000);}
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function impAutoMap(type,hdrs){
  var cfg=IMP_CONFIGS[type];
  impCtx.mapping={};
  var hLow=hdrs.map(function(h){return h.toLowerCase().replace(/[\s_\-\.\/\(\)\[\]]/g,'');});
  cfg.fields.forEach(function(f){
    var found=-1;
    f.hints.forEach(function(hint){
      if(found>=0)return;
      var hn=hint.toLowerCase().replace(/[\s_\-\.\/\(\)\[\]]/g,'');
      var idx=hLow.indexOf(hn);
      if(idx>=0)found=idx;
    });
    if(found<0){
      hLow.forEach(function(h,i){
        if(found>=0)return;
        f.hints.forEach(function(hint){
          if(found>=0)return;
          var hn=hint.toLowerCase().replace(/[\s_\-\.\/\(\)\[\]]/g,'');
          if(h.length>2&&hn.length>2&&(h.includes(hn)||hn.includes(h)))found=i;
        });
      });
    }
    impCtx.mapping[f.k]=found;
  });
}

function impGetMapping(){
  var m={};
  IMP_CONFIGS[impCtx.type].fields.forEach(function(f){
    var sel=document.getElementById('impMap_'+f.k);
    m[f.k]=sel?parseInt(sel.value):(impCtx.mapping[f.k]!=null?impCtx.mapping[f.k]:-1);
  });
  return m;
}

function impCellVal(row,ci,type){
  if(ci==null||ci<0)return null;
  var v=row[ci];
  if(v===undefined||v===null||String(v).trim()==='')return null;
  v=String(v).trim();
  if(type==='int'){var n=parseInt(v.replace(/[^\d\-]/g,''));return isNaN(n)?null:n;}
  if(type==='float'){var fv=parseFloat(v.replace(',','.').replace(/[^\d\.\-]/g,''));return isNaN(fv)?null:fv;}
  if(type==='date'){
    var d=new Date(v);if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];
    var m=v.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
    if(m){var y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
    return v;
  }
  return v;
}

function impDoPreview(){
  var mapping=impGetMapping();
  var cfg=IMP_CONFIGS[impCtx.type];
  var vis=cfg.fields.filter(function(f){return mapping[f.k]>=0;});
  var prev=impCtx.rows.slice(0,5);
  var h='<div class="fw-bold mb-2" style="font-size:12px;color:var(--az)"><i class="bi bi-table me-2"></i>Vista previa — '+prev.length+' primeras filas</div>';
  h+='<div class="table-responsive"><table class="table table-sm tbl mb-0"><thead style="font-size:10px;background:#f5f7fa"><tr><th>#</th>';
  vis.forEach(function(f){h+='<th>'+(f.req?'<b>':'')+f.l+(f.req?'</b>':'')+'</th>';});
  h+='</tr></thead><tbody>';
  prev.forEach(function(row,ri){
    var hasErr=vis.some(function(f){return f.req&&impCellVal(row,mapping[f.k],f.type)===null;});
    h+='<tr'+(hasErr?' class="table-warning"':'')+'><td style="font-size:9px;color:#999">'+(ri+2)+'</td>';
    vis.forEach(function(f){
      var v=impCellVal(row,mapping[f.k],f.type);
      h+='<td style="font-size:10px;'+(v===null?'color:#ccc':'')+'">'+( v!==null?String(v).substring(0,20):'—')+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  if(impCtx.rows.length>5)h+='<div style="font-size:10px;color:#888;margin-top:4px">... y '+(impCtx.rows.length-5)+' filas más</div>';
  document.getElementById('impPreviewZone').innerHTML=h;
}

function impDoImport(){
  var mapping=impGetMapping();
  var cfg=IMP_CONFIGS[impCtx.type];
  var missing=cfg.fields.filter(function(f){return f.req&&(mapping[f.k]==null||mapping[f.k]<0);}).map(function(f){return f.l;});
  if(missing.length){toast('Campos obligatorios sin mapear: '+missing.join(', '),'err',6000);return;}
  var ok=0,err=0,errs=[];
  if(impCtx.type==='articulos')impImportArticulos(mapping,function(o,e,es){ok=o;err=e;errs=es;});
  else if(impCtx.type==='pedidos')impImportPedidos(mapping,function(o,e,es){ok=o;err=e;errs=es;});
  else if(impCtx.type==='layout')impImportLayout(mapping,function(o,e,es){ok=o;err=e;errs=es;});
  else if(impCtx.type==='clientes')impImportClientes(mapping,function(o,e,es){ok=o;err=e;errs=es;});
  if(errs.length)console.warn('[SGA Import]',errs);
  closeModal('mImp');
  toast(cfg.label+': '+ok+' registros importados'+(err?' · '+err+' errores':''),(err&&ok===0)?'err':err?'warn':'ok',5000);
  // Refrescar la vista correcta según tipo importado
  if(impCtx.type==='layout'){rAlm();}
  else if(impCtx.type==='pedidos'){rPed();}
  else{rMae();}
}

function impImportArticulos(mapping,cb){
  var ok=0,err=0,errs=[];
  impCtx.rows.forEach(function(row,ri){
    try{
      var sku=impCellVal(row,mapping.picking_code,'str');
      if(!sku){err++;errs.push('F'+(ri+2)+': SKU vacío');return;}
      sku=sku.toUpperCase().trim();
      var ex=PRODUCTS.find(function(p){return p.picking_code===sku||p.sku===sku;});
      if(ex){
        IMP_CONFIGS.articulos.fields.forEach(function(f){
          if(f.k==='picking_code')return;
          var v=impCellVal(row,mapping[f.k],f.type);
          if(v!==null)ex[f.k]=v;
        });
        var rule=REP_RULES.find(function(r){return r.product_id===ex.id;});
        if(rule&&ex.min_stock){rule.min_pick_qty=ex.min_stock;rule.target_pick_qty=ex.target_stock||rule.target_pick_qty;}
        ok++;
      } else {
        var nid='P'+String(PRODUCTS.length+1).padStart(3,'0');
        var np={id:nid,sku:sku,picking_code:sku,
          ean:impCellVal(row,mapping.ean,'str')||'',
          desc:impCellVal(row,mapping.desc,'str')||sku,
          fam_id:impCellVal(row,mapping.fam_id,'str')||'F01',
          sfam_id:impCellVal(row,mapping.sfam_id,'str')||'SF01',
          sup_id:impCellVal(row,mapping.sup_id,'str')||'SUP001',
          u_w:impCellVal(row,mapping.u_w,'float')||1,
          upc:impCellVal(row,mapping.upc,'int')||1,
          cpp:impCellVal(row,mapping.cpp,'int')||1,
          vat:impCellVal(row,mapping.vat,'int')||10,
          price:impCellVal(row,mapping.price,'float')||0,
          cost:impCellVal(row,mapping.cost,'float')||0,
          min_stock:impCellVal(row,mapping.min_stock,'int')||0,
          target_stock:impCellVal(row,mapping.target_stock,'int')||0,
          rotation:impCellVal(row,mapping.rotation,'str')||'B',
          min_days_recv:impCellVal(row,mapping.min_days_recv,'int')||30,
          temp:'AMB',pick_loc:impCellVal(row,mapping.pick_loc,'str')||'',pidx:PRODUCTS.length%5};
        PRODUCTS.push(np);
        REP_RULES.push({product_id:nid,min_pick_qty:np.min_stock,target_pick_qty:np.target_stock,priority_level:np.rotation==='A'?1:2,active:true});
        ok++;
      }
    }catch(ex2){err++;errs.push('F'+(ri+2)+': '+ex2.message);}
  });
  cb(ok,err,errs);
}

function impImportPedidos(mapping,cb){
  var ok=0,err=0,errs=[],ordMap={};
  impCtx.rows.forEach(function(row,ri){
    try{
      var cliCode=impCellVal(row,mapping.client_code,'str');
      var artCode=impCellVal(row,mapping.product_code,'str');
      var qty=impCellVal(row,mapping.qty_ordered,'int');
      var fecha=impCellVal(row,mapping.requested_ship_date,'date')||hoy();
      if(!cliCode){err++;errs.push('F'+(ri+2)+': cliente vacío');return;}
      if(!artCode){err++;errs.push('F'+(ri+2)+': artículo vacío');return;}
      if(!qty||qty<=0){err++;errs.push('F'+(ri+2)+': cantidad inválida');return;}
      var cli=CLIENTS.find(function(c){return c.code===cliCode||c.id===cliCode||c.name.toUpperCase()===cliCode.toUpperCase();});
      if(!cli){err++;errs.push('F'+(ri+2)+': cliente "'+cliCode+'" no encontrado');return;}
      var prod=PRODUCTS.find(function(p){return p.picking_code===artCode||p.id===artCode||p.sku===artCode||p.ean===artCode;});
      if(!prod){err++;errs.push('F'+(ri+2)+': artículo "'+artCode+'" no encontrado');return;}
      var rCode=impCellVal(row,mapping.route_code,'str');
      var route=rCode?ROUTES.find(function(r){return r.code===rCode||r.id===rCode;}):null;
      var rid=route?route.id:cli.route_id;
      var cat=impCellVal(row,mapping.priority_class,'str')||cli.priority_class;
      var sla=impCellVal(row,mapping.sla_cutoff,'str')||'09:00';
      var key=cli.id+'_'+fecha+'_'+rid;
      if(!ordMap[key])ordMap[key]={client_id:cli.id,priority_class:cat,route_id:rid,requested_ship_date:fecha,sla_cutoff:sla,status:'PENDIENTE',lines:[]};
      ordMap[key].lines.push({product_id:prod.id,qty_ordered:qty,qty_allocated:0,qty_picked:0});
      ok++;
    }catch(ex){err++;errs.push('F'+(ri+2)+': '+ex.message);}
  });
  Object.values(ordMap).forEach(function(o){o.id='PED'+String(DB.seq.ord++).padStart(5,'0');DB.orders.push(o);});
  cb(ok,err,errs);
}

function impImportLayout(mapping,cb){
  var ok=0,err=0,errs=[];

        DB.locations.push({id:DB.locations.length+1,code:code,zone:zone,

var EXP_DATE={from:'',to:''};

function expXL(rows,sheetName,filename){
  if(typeof XLSX==='undefined'){toast('Librería Excel no disponible','err');return;}
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet(rows);
  // Auto ancho columnas
  var maxW=rows[0].map(function(_,ci){return Math.min(40,Math.max(10,rows.reduce(function(m,r){return Math.max(m,String(r[ci]||'').length);},0)));});
  ws['!cols']=maxW.map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,filename+'_'+hoy()+'.xlsx');
  toast('Exportado: '+filename+'_'+hoy()+'.xlsx','ok');
}

function expInRange(dateStr){
  if(!EXP_DATE.from&&!EXP_DATE.to)return true;
  if(!dateStr)return false;
  var d=dateStr.split('T')[0];
  if(EXP_DATE.from&&d<EXP_DATE.from)return false;
  if(EXP_DATE.to&&d>EXP_DATE.to)return false;
  return true;
}

var gSilentMode=false;
var gRestauradoInicial=false; // evita re-restaurar en cada refresco de token

// Inicializa el cliente de token una sola vez (compartido por manual y automático)
function driveInitClient(){
  if(gTokenClient) return true;
  if(typeof google==='undefined'||!google.accounts||!google.accounts.oauth2) return false;
  gTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CONFIG.clientId, scope:GOOGLE_CONFIG.scope,
    hint:GOOGLE_CONFIG.cuenta,
    callback:onDriveToken,
    error_callback:onDriveError
  });
  return true;
}
function onDriveToken(r){
  if(r.error){ if(!gSilentMode){toast('Error OAuth: '+r.error,'err',5000);syncLog('❌ '+r.error);} gSilentMode=false; return; }
  gAccessToken=r.access_token;
  syncLog(gSilentMode?'✅ Reconectado a Drive (automático)':'✅ Conectado a Google Drive');
  if(!gSilentMode) toast('Conectado a Google Drive','ok');
  gSilentMode=false;
  scheduleTokenRefresh();
  var v=document.getElementById('v-sync'); if(v&&v.classList.contains('act')) rSync();
  // Carga automática de datos desde Drive en la primera conexión
  if(!gRestauradoInicial){ gRestauradoInicial=true; driveAutoRestore(); }
}

// Renueva el token en silencio antes de que caduque (~1h)
function scheduleTokenRefresh(){
  if(window._tokRefresh) clearTimeout(window._tokRefresh);
  window._tokRefresh=setTimeout(function(){ driveSilentAuth(); }, 50*60*1000);
}

// Autorización MANUAL (primera vez, con consentimiento)
function esOrigenSeguro(){ return location.protocol==='https:'; }

function driveAuth(){
  if(!esOrigenSeguro()){
    syncEstado('❌ OAuth requiere HTTPS. Abre la app desde https://emiliomontorog-cloud.github.io/sga-dalt/','alert-danger');
    toast('OAuth solo funciona en HTTPS. Abre desde la URL github.io, no en local.','err',8000);
    return;
  }
  if(!driveInitClient()){
    gAuthRetries++;
    if(gAuthRetries>8){toast('No se pudo cargar Google. Revisa conexión/extensiones y recarga (F5)','err',6000);gAuthRetries=0;return;}
    syncEstado('⏳ Cargando Google... ('+gAuthRetries+'/8)','alert-warning');
    setTimeout(driveAuth,1000);return;
  }
  gAuthRetries=0; gSilentMode=false;
  syncEstado('⏳ Abriendo autorización de Google...','alert-warning');
  gTokenClient.requestAccessToken({prompt:'consent'});
}

// Conexión AUTOMÁTICA/silenciosa (sin popup) — al arrancar o renovar
function driveSilentAuth(){
  if(!esOrigenSeguro()) return; // OAuth solo en HTTPS
  if(!driveInitClient()) return;
  gSilentMode=true;
  try{ gTokenClient.requestAccessToken({prompt:''}); }catch(e){ gSilentMode=false; }
}

// Intenta conectar solo al arrancar (solo en HTTPS; reintenta hasta que GIS cargue)
function driveTryAutoConnect(intentos){
  if(!esOrigenSeguro()){ syncLog('ℹ️ Abre desde HTTPS (github.io) para conectar a Drive'); return; }
  intentos=intentos||0;
  if(typeof google!=='undefined'&&google.accounts&&google.accounts.oauth2){ driveSilentAuth(); return; }
  if(intentos<12) setTimeout(function(){driveTryAutoConnect(intentos+1);},500);
}

function driveLogout(){
  if(gAccessToken&&google.accounts)google.accounts.oauth2.revoke(gAccessToken,function(){});
  gAccessToken=null;gDriveIndex={};if(gAutoSync){clearInterval(gAutoSync);gAutoSync=null;}
  syncLog('🔒 Sesión cerrada');rSync();
}

// Crea o actualiza un archivo JSON en Drive
// Asegura que existe una carpeta (la crea si no), devuelve su ID
async function driveEnsureFolder(nombre,parentId){
  var key='F:'+(parentId||'root')+':'+nombre;
  if(gFolders[key]) return gFolders[key];
  var q="name='"+nombre+"' and mimeType='application/vnd.google-apps.folder' and trashed=false"+(parentId?(" and '"+parentId+"' in parents"):"");
  var s=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:{'Authorization':'Bearer '+gAccessToken}});
  if(!s.ok)throw new Error('buscar carpeta '+nombre);
  var sd=await s.json();
  if(sd.files&&sd.files.length){gFolders[key]=sd.files[0].id;return gFolders[key];}
  var meta={name:nombre,mimeType:'application/vnd.google-apps.folder'};
  if(parentId)meta.parents=[parentId];
  var r=await fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{'Authorization':'Bearer '+gAccessToken,'Content-Type':'application/json'},body:JSON.stringify(meta)});
  if(!r.ok)throw new Error('crear carpeta '+nombre);
  var d=await r.json();gFolders[key]=d.id;return d.id;
}
// Crea/obtiene la estructura de carpetas del proyecto
async function driveCarpetas(){
  if(gFolders._listas) return gFolders._listas;
  var root=await driveEnsureFolder('SGA-DALT-PRODESCO',null);
  var oper=await driveEnsureFolder('OPERACION',root);
  var maes=await driveEnsureFolder('MAESTROS',root);
  var cop=await driveEnsureFolder('COPIAS_SEGURIDAD',root);
  gFolders._listas={root:root,oper:oper,maes:maes,cop:cop};
  return gFolders._listas;
}

// Busca el id de un archivo por nombre (y carpeta) en Drive; null si no existe
async function driveFindId(nombre,parentId){
  var q="name='"+nombre+"' and trashed=false"+(parentId?(" and '"+parentId+"' in parents"):"");
  var s=await fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id)&orderBy=modifiedTime desc',{headers:{'Authorization':'Bearer '+gAccessToken}});
  if(!s.ok)return null;
  var sd=await s.json();
  return (sd.files&&sd.files.length)?sd.files[0].id:null;
}

async function driveUpsert(nombre,obj,parentId){
  var contenido=JSON.stringify(obj);
  var fid=gDriveIndex[nombre]; if(!fid) fid=await driveFindId(nombre,parentId);
  if(fid){
    gDriveIndex[nombre]=fid;
    var r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=media',{method:'PATCH',headers:{'Authorization':'Bearer '+gAccessToken,'Content-Type':'application/json'},body:contenido});
    if(!r.ok)throw new Error('actualizar '+nombre);return;
  }
  var m={name:nombre,mimeType:'application/json'}; if(parentId)m.parents=[parentId];
  var fd=new FormData();
  fd.append('metadata',new Blob([JSON.stringify(m)],{type:'application/json'}));
  fd.append('file',new Blob([contenido],{type:'application/json'}));
  var r2=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{'Authorization':'Bearer '+gAccessToken},body:fd});
  if(!r2.ok)throw new Error('crear '+nombre);
  var d=await r2.json();gDriveIndex[nombre]=d.id;
}

// Descarga y parsea un JSON de Drive (o null si no existe)
async function driveDownload(nombre){
  var q=encodeURIComponent("name='"+nombre+"' and trashed=false");
  var s=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc',{headers:{'Authorization':'Bearer '+gAccessToken}});
  if(!s.ok)throw new Error('buscar '+nombre);
  var sd=await s.json();
  if(!sd.files||!sd.files.length)return null;
  var fid=sd.files[0].id;gDriveIndex[nombre]=fid;
  var c=await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',{headers:{'Authorization':'Bearer '+gAccessToken}});
  if(!c.ok)throw new Error('descargar '+nombre);
  return await c.json();
}

// Sube/actualiza un archivo BINARIO (xlsx) en Drive
async function driveUpsertBin(nombre,bytes,mime,parentId){
  var fid=gDriveIndex[nombre]; if(!fid) fid=await driveFindId(nombre,parentId);
  if(fid){
    gDriveIndex[nombre]=fid;
    var r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=media',{method:'PATCH',headers:{'Authorization':'Bearer '+gAccessToken},body:new Blob([bytes],{type:mime})});
    if(!r.ok)throw new Error('actualizar '+nombre);return;
  }
  var m={name:nombre,mimeType:mime}; if(parentId)m.parents=[parentId];
  var fd=new FormData();
  fd.append('metadata',new Blob([JSON.stringify(m)],{type:'application/json'}));
  fd.append('file',new Blob([bytes],{type:mime}));
  var r2=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{'Authorization':'Bearer '+gAccessToken},body:fd});
  if(!r2.ok)throw new Error('crear '+nombre);
  var d=await r2.json();gDriveIndex[nombre]=d.id;
}

// Genera un Excel con TABLAS por entidad y lo sube a Drive (abrible directamente)
async function driveExportTablas(){
  if(typeof XLSX==='undefined')throw new Error('XLSX no disponible');
  var wb=XLSX.utils.book_new();
  function hoja(nombre,filas){XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(filas.length?filas:[{aviso:'Sin datos'}]),nombre);}
  // Recepciones (palés recibidos)
  hoja('Recepciones',DB.pallets.map(function(p){var lot=gLot(p.lot_id),pr=gP(p.product_id),loc=gL(p.location_id);return{Pale:p.id,Articulo:pr?pr.picking_code:'',Descripcion:pr?pr.desc:'',EAN:pr?pr.ean:'',Lote:lot?lot.lot_code:'',Caducidad:lot?lot.expiry_date:'',Cantidad:p.qty_units,Ubicacion:loc?(loc.code||loc.Ubicacion||''):'',Estado:p.status,Fecha:p.receipt_date||''};}));
  // Movimientos
  hoja('Movimientos',DB.movements.map(function(m){var pr=gP(m.product_id);return{Id:m.id,Tipo:movLbl(m.movement_type),Fecha:m.movement_datetime,Articulo:pr?pr.picking_code:'',Cantidad:m.quantity_units,Desde:m.from_location_id,Hacia:m.to_location_id,Usuario:m.user_id};}));
  // Pedidos (una fila por línea)
  var ped=[];DB.orders.forEach(function(o){var c=gC(o.client_id);(o.lines||[]).forEach(function(l){var pr=gP(l.product_id);ped.push({Pedido:o.id,Cliente:c?c.name:'',Estado:o.status,Ruta:o.route_id,Entrega:o.requested_ship_date,Articulo:pr?pr.picking_code:'',Pedido_Ud:l.qty_ordered,Preparado_Ud:l.qty_picked});});});
  hoja('Pedidos',ped);
  // Stock por ubicación
  hoja('Stock',DB.stock_by_location.map(function(s){var pr=gP(s.product_id),lot=gLot(s.lot_id),loc=gL(s.location_id);return{Ubicacion:loc?(loc.code||loc.Ubicacion||''):'',Articulo:pr?pr.picking_code:'',Lote:lot?lot.lot_code:'',Cantidad:s.qty_units,Reservado:s.reserved_units,Bloqueado:s.blocked_units};}));
  // Lotes
  hoja('Lotes',DB.lots.map(function(l){var pr=gP(l.product_id);return{Lote:l.lot_code,Articulo:pr?pr.picking_code:'',Caducidad:l.expiry_date,Estado:l.status,Calidad:l.quality_status};}));
  // Expediciones
  hoja('Expediciones',(DB.shipments||[]).map(function(s){return{Id:s.id,Ruta:s.route_id,Fecha:s.date||s.created_at||'',Pedidos:(s.order_ids||[]).join(', ')};}));
  // Bloqueos de calidad
  hoja('Bloqueos',(DB.quality_blocks||[]).map(function(b){var pr=gP(b.product_id);return{Id:b.id,Articulo:pr?pr.picking_code:'',Motivo:b.block_reason,Estado:b.status,Fecha:b.created_at};}));
  // Mapa de almacén / Ubicaciones (31 campos)
  hoja('Ubicaciones',LOCATIONS.map(function(loc){var o={};MAPA_CAMPOS.forEach(function(c){o[c]=(loc[c]===null||loc[c]===undefined)?'':loc[c];});return o;}));
  // Maestros reales (columnas exactas del Excel)
  hoja('MaestroArticulos',ARTS.map(function(a){var o={};ART_CAMPOS.forEach(function(c){o[c]=(a[c]==null)?'':a[c];});return o;}));
  hoja('Proveedor',PROVS.map(function(p){return{IdProv:p['IdProv']||'',Proveedor:p['Proveedor']||''};}));
  hoja('Transportistas',TRANSP.map(function(t){return{IdTransportistas:t['IdTransportistas']||'',Transportista:t['Transportista']||'',Observaciones:t['Observaciones']||''};}));
  hoja('Usuarios',USUARIOS.map(function(u){var o={};USER_CAMPOS.forEach(function(c){o[c]=(u[c]==null)?'':u[c];});return o;}));
  // Pedidos de compra (columnas reales)
  hoja('PedidosCompras',PEDIDOS.map(function(p){var o={};PED_CAMPOS.forEach(function(c){o[c]=(p[c]==null)?'':p[c];});return o;}));
  // Recepciones realizadas (una fila por palé, con su ubicación)
  var recRows=[];
  RECEP.forEach(function(r){(r.pallets||[{}]).forEach(function(p){recRows.push({IdRecepcion:r.IdRecepcion,Fecha_Hora_Recepcion:r.Fecha_Hora_Recepcion,EAN:r.EAN,Descripcion:r.Descripcion,Familia:r.Familia||'',Grupo:r.Grupo||'',NombreProveedor:r.NombreProveedor,Lote:r.Lote,FechaCaducidad:r.FechaCaducidad,Cantidad_Recibida:p.cantidad!=null?p.cantidad:r.Cantidad_Recibida,'NºPales':r['NºPales'],TipoPale:r.TipoPale,IdPale:p.idPale||'',UbicacionReservaAsignada:p.ubicacion||'',MuelleDescarga:r.MuelleDescarga,Transportista:r.Transportista,IdPedido:r.IdPedido,Id_Linea_Pedido:r.Id_Linea_Pedido,Estado_Recepcion:r.Estado_Recepcion,Observaciones:r.Observaciones});});});
  hoja('Recepciones',recRows);
  // Controles de almacén (verificación + ubicación)
  hoja('Controles',CONTROLES.map(function(x){return{IdControl:x.IdControl,Fecha_Hora:x.Fecha_Hora,EAN:x.EAN,IdArticulo:x.IdArticulo,Descripcion:x.Descripcion,UbicacionPicking:x.UbicacionPicking,UbicacionAsignada:x.UbicacionAsignada,Modo:x.Modo,Cantidad:x.Cantidad,Observaciones:x.Observaciones,Usuario:x.Usuario};}));
  var bytes=XLSX.write(wb,{type:'array',bookType:'xlsx'});
  var carp=await driveCarpetas();
  await driveUpsertBin('SGA_DALT_Operaciones.xlsx',bytes,'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',carp.oper);
}

// Auto-guardado tras operaciones (con anti-rebote para agrupar acciones seguidas)
var _autoSaveTimer=null;
function driveAutoSave(){
  if(!gAccessToken)return; // solo si estás conectado a Drive
  if(_autoSaveTimer)clearTimeout(_autoSaveTimer);
  _autoSaveTimer=setTimeout(async function(){
    try{
      var carp=await driveCarpetas();
      await driveUpsert(BACKUP_NAME,snapshotEstado(),carp.cop);
      await saveMaestrosDrive();
      await driveExportTablas();
      syncLog('💾 Auto-guardado: maestros + copia + tablas Excel');
      toast('Datos guardados en Drive','ok',1800);
    }catch(e){syncLog('⚠️ Auto-guardado falló: '+e.message);}
  },3500);
}

// Engancha el auto-guardado al final de cada operación que modifica datos
['regRec','confirmScan','completePed','startWave','saveNewPed','confirmBlock','confirmShip','genRepTask','completeRepTask','saveCount','saveEdit'].forEach(function(fn){
  var orig=window[fn];
  if(typeof orig==='function'){
    window[fn]=function(){ var r=orig.apply(this,arguments); try{driveAutoSave();}catch(e){} return r; };
  }
});

  navv('dash');
  // Intento de conexión automática a Drive (silenciosa, sin popup)
  driveTryAutoConnect();
});

if(document.readyState === 'complete' || document.readyState === 'interactive'){
  console.log('✅ Página ya cargada, inicializando...');
  setTimeout(function(){
    navv('dash');
  }, 100);
}
